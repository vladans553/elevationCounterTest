name: GitHub Actions Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout koda
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Pokretanje testova direktno na GitHubu
      # Ovde više ne trebaju env varijable za BrowserStack
      run: mvn test -DsuiteXmlFile=testng-fastRemote.xml